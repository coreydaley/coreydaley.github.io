{{ $src := .Get "src" }}
{{ $alt := .Get "alt" | default "" }}
<div style="text-align: center; margin: 2rem 0;">
  <img src="{{ $src }}" alt="{{ $alt }}" style="max-width: 100%; height: auto; border-radius: 8px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);">
</div>
