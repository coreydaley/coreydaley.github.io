{{- $url := .Destination -}}
{{- $isExternal := and (not (hasPrefix $url "/")) (not (hasPrefix $url "#")) (hasPrefix $url "http") -}}
{{- $forceNewTab := eq .Title "_blank" -}}
{{- $openNewTab := or $isExternal $forceNewTab -}}


<a
  href="{{ $url }}"
  {{- if and (not $forceNewTab) .Title }} title="{{ .Title }}"{{ end -}}
  {{- if $openNewTab }} target="_blank" rel="noopener noreferrer"{{ end -}}
>
  {{- .Text | safeHTML -}}
</a>
