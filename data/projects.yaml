- name: "obsidian-ai-agent-sidebar-plugin"
  status: "Active"
  github: "https://github.com/coreydaley/obsidian-ai-agent-sidebar-plugin"
  description: >-
    An Obsidian plugin that adds a sidebar for chatting with AI agents — Claude Code, OpenAI Codex,
    Google Gemini, GitHub Copilot, and any OpenAI-compatible endpoint. Agents can read, create,
    edit, rename, and delete files in your vault via CLI tools or direct API calls, with streaming
    responses and auto-context from the currently open note.
  tech:
    - "TypeScript"
    - "Obsidian API"
    - "Node.js"
  highlights:
    - "Supports Claude, Codex, Gemini, Copilot, and any OpenAI-compatible server (Ollama, vLLM, LM Studio)"
    - "Both CLI mode (spawns installed tool) and API mode (direct provider API with key) per agent"
    - "Vault CRUD operations with path validation and confirmation prompt for deletes"
    - "Streaming responses, multi-agent tabs, persistent conversations, and debug mode"

- name: "agent-config"
  status: "Active"
  github: "https://github.com/coreydaley/agent-config"
  description: >-
    Centralized repository for AI agent configurations, skills, and commands across Claude Code,
    GitHub Copilot, Codex CLI, and Gemini CLI. A Makefile build pipeline handles per-agent format
    conversion so one source of truth produces correctly formatted output for every tool.
  tech:
    - "Makefile"
    - "YAML"
    - "Markdown"
    - "Shell"
  highlights:
    - "Single source of truth for commands and skills shared across four AI coding agents"
    - "Makefile pipeline converts shared configs into each agent's native format automatically"
    - "Covers Claude Code, GitHub Copilot, OpenAI Codex CLI, and Gemini CLI"

- name: "attractor"
  status: "Active"
  url: "https://attractor.coreydaley.dev"
  github: "https://github.com/coreydaley/attractor"
  description: >-
    A DOT-based AI pipeline orchestration engine built in Kotlin. Define multi-LLM workflows as
    Graphviz directed graphs; the engine pulls execution toward your goal through conditional
    branches, retries, and human review gates. Documentation and guides live at
    attractor.coreydaley.dev.
  tech:
    - "Kotlin"
    - "Graphviz DOT"
    - "Gradle"
  highlights:
    - "Pipelines are defined as Graphviz DOT files — version-controllable and human-readable"
    - "Supports conditional branching, parallel execution, retries, and human review gates"
    - "Designed to orchestrate workflows across multiple LLM providers"

