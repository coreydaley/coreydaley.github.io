baseURL = 'https://coreydaley.dev/'
languageCode = 'en-us'
title = 'Corey Daley'
theme = 'coreydaley-dev'

[mediaTypes."application/manifest+json"]
  suffixes = ["webmanifest"]

[outputFormats.webmanifest]
  mediaType = "application/manifest+json"
  baseName = "site"
  isPlainText = true
  notAlternative = true

[outputFormats.RSS]
  baseName = "rss"

[outputs]
  home = ["HTML", "RSS", "webmanifest"]

[pagination]
  pagerSize = 10

[params]
  # Add your images to static/images/ directory
  avatar = '/images/avatars/avatar.webp'
  coverImage = '/images/cover.webp'
  description = 'Technical blog about software engineering and AI development'
  tagline = 'Software Engineer & AI Enthusiast'

  # Enable special date avatar swapping (e.g., Halloween, Christmas, etc.)
  enableCheckSpecialDate = true

[params.manifest]
  shortName = "Corey Daley"
  themeColor = "#ffffff"
  backgroundColor = "#ffffff"

[params.social]
  github = 'https://github.com/coreydaley'
  linkedin = 'https://linkedin.com/in/coreydaley-dev'
  email = 'corey@coreydaley.dev'

[params.tracking]
  googleAnalytics = 'G-21PJ0PFQM1'

[related]
  includeNewer = true
  threshold = 20
  toLower = true

  [[related.indices]]
    name = "categories"
    weight = 100

  [[related.indices]]
    name = "tags"
    weight = 80
